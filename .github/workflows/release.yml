name: 发布 NEA Windows 安装包

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: 验证并构建 MSI
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 检查 Release 说明
        shell: pwsh
        run: |
          $notes = ".github/releases/${{ github.ref_name }}.md"
          if (-not (Test-Path -LiteralPath $notes)) {
            throw "缺少 Release 说明：$notes"
          }

      - name: 完整验证
        run: pnpm run verify:full

      - name: 构建 NEA 安装包
        run: pnpm run build:msi

      - name: 生成 SHA-256 校验文件
        shell: pwsh
        run: |
          $msi = Get-ChildItem -LiteralPath "src-tauri/target/release/bundle/msi" -Filter "NEA_*.msi" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $msi) {
            throw "未找到 NEA MSI 安装包"
          }
          $hash = (Get-FileHash -LiteralPath $msi.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($msi.Name)" | Set-Content -LiteralPath "$($msi.FullName).sha256" -Encoding ascii

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEA ${{ github.ref_name }}
          body_path: .github/releases/${{ github.ref_name }}.md
          files: |
            src-tauri/target/release/bundle/msi/NEA_*.msi
            src-tauri/target/release/bundle/msi/NEA_*.msi.sha256
